<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070B" />
      <stop offset="50%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    
    <linearGradient id="purple-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7928CA" />
      <stop offset="100%" stop-color="#FF0080" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="400" fill="url(#bg-gradient)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Abstract Design Accents (Tech Waves/Lines) -->
  <path d="M-100,350 Q 200,300 400,380 T 900,320 T 1300,390" fill="none" stroke="#1E293B" stroke-width="1.5" opacity="0.5"/>
  <path d="M-100,360 Q 200,310 400,390 T 900,330 T 1300,400" fill="none" stroke="url(#text-gradient)" stroke-width="1" opacity="0.15" />

  <!-- LEFT SIDE: TYPOGRAPHY & BRANDING -->
  <g transform="translate(80, 0)">
    <!-- Main Title -->
    <text x="0" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="54" font-weight="800" fill="url(#text-gradient)" letter-spacing="2">GIT IT FIXED</text>
    
    <!-- Tagline / Subtitle -->
    <text x="0" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" fill="#E2E8F0" letter-spacing="1">GitHub Issues Tracker</text>
    
    <!-- Description text from site pitch -->
    <text x="0" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#94A3B8">Track, manage, and fix repository issues seamlessly.</text>
    
    <!-- Tech & Architecture Badges -->
    <g transform="translate(0, 265)">
      <!-- Badge 1: Architecture -->
      <rect x="0" y="0" width="105" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="52.5" y="18" font-family="monospace" font-size="12" font-weight="bold" fill="#00F2FE" text-anchor="middle">VANILLA JS</text>

      <!-- Badge 2: Interface -->
      <rect x="117" y="0" width="115" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="174.5" y="18" font-family="monospace" font-size="12" font-weight="bold" fill="#E2E8F0" text-anchor="middle">MINIMALIST UI</text>
      
      <!-- Badge 3: Status -->
      <rect x="242" y="0" width="85" height="28" rx="6" fill="#065F46" stroke="#059669" stroke-width="1"/>
      <text x="284.5" y="18" font-family="monospace" font-size="12" font-weight="bold" fill="#34D399" text-anchor="middle">PRODUCTION</text>
    </g>
  </g>

  <!-- RIGHT SIDE: DASHBOARD WIREFRAME MOCKUP -->
  <g transform="translate(680, 55)">
    <!-- Window Container Frame -->
    <rect x="0" y="0" width="440" height="290" rx="12" fill="#0F172A" stroke="#1E293B" stroke-width="2" />
    <rect x="0" y="0" width="440" height="290" rx="12" fill="none" stroke="#00F2FE" stroke-width="1" opacity="0.2" filter="url(#neon-glow)" />

    <!-- Window Header (Mac Style) -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 428 0 A 12 12 0 0 1 440 12 L 440 40 L 0 40 Z" fill="#1E293B" />
    <circle cx="20" cy="20" r="5" fill="#EF4444" />
    <circle cx="36" cy="20" r="5" fill="#F59E0B" />
    <circle cx="52" cy="20" r="5" fill="#10B981" />
    <text x="220" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle" font-weight="500">git-it-fixed.netlify.app</text>

    <!-- App Content: Search / Action Bar Mock -->
    <rect x="20" y="55" width="260" height="28" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="32" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#475569">🔍 Search issues...</text>
    
    <!-- "New Issue" Accent Button -->
    <rect x="295" y="55" width="125" height="28" rx="6" fill="url(#text-gradient)" />
    <text x="357.5" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#05070B" text-anchor="middle">➕ Create Issue</text>

    <!-- Issue Cards Container Stack -->
    <!-- Card 1: High Priority / Open -->
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="400" height="52" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
      <circle cx="20" cy="26" r="4" fill="#00F2FE" filter="url(#neon-glow)" />
      <text x="38" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">🐛 Fix state lag on DOM re-render</text>
      <text x="38" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#64748B">#104 opened 2 hours ago</text>
      <!-- Badges -->
      <rect x="300" y="16" width="42" height="18" rx="4" fill="#7F1D1D" />
      <text x="321" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="bold" fill="#F87171" text-anchor="middle">HIGH</text>
      <rect x="348" y="16" width="40" height="18" rx="4" fill="#064E3B" />
      <text x="368" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="bold" fill="#34D399" text-anchor="middle">OPEN</text>
    </g>

    <!-- Card 2: Medium Priority / Open -->
    <g transform="translate(20, 162)">
      <rect x="0" y="0" width="400" height="52" rx="8" fill="#1E293B" stroke="#223047" stroke-width="1" opacity="0.8"/>
      <circle cx="20" cy="26" r="4" fill="#00F2FE" />
      <text x="38" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">✨ Implement custom priority sorting</text>
      <text x="38" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#64748B">#103 opened yesterday</text>
      <!-- Badges -->
      <rect x="300" y="16" width="42" height="18" rx="4" fill="#78350F" />
      <text x="321" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="bold" fill="#FBBF24" text-anchor="middle">MED</text>
      <rect x="348" y="16" width="40" height="18" rx="4" fill="#064E3B" />
      <text x="368" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="bold" fill="#34D399" text-anchor="middle">OPEN</text>
    </g>

    <!-- Card 3: Low Priority / Closed -->
    <g transform="translate(20, 224)">
      <rect x="0" y="0" width="400" height="52" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1" opacity="0.5"/>
      <circle cx="20" cy="26" r="4" fill="#64748B" />
      <text x="38" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#64748B" text-decoration="line-through">🎨 Refactor footer layout typography</text>
      <text x="38" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#475569">#101 closed 3 days ago</text>
      <!-- Badges -->
      <rect x="340" y="16" width="48" height="18" rx="4" fill="#334155" />
      <text x="364" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="bold" fill="#94A3B8" text-anchor="middle">CLOSED</text>
    </g>
  </g>

  <!-- SUBTLE BRANDING WATERMARK FOOTER -->
  <text x="80" y="365" font-family="monospace" font-size="11" font-weight="bold" fill="#334155" letter-spacing="1">ROGUE SYNTAX // DESIGN LAB</text>
  <text x="1120" y="365" font-family="monospace" font-size="11" font-weight="bold" fill="#334155" text-anchor="end" letter-spacing="1">MARCH 2026</text>
</svg>
